<h2 mat-dialog-title>Create New Order</h2>
<mat-dialog-content>
  <form [formGroup]="form" class="dialog-form">
    <mat-form-field appearance="outline">
      <mat-label>Customer Name</mat-label>
      <input matInput formControlName="customerName">
    </mat-form-field>
    <mat-form-field appearance="outline">
      <mat-label>Customer Phone</mat-label>
      <input matInput formControlName="customerPhone">
    </mat-form-field>
    <mat-form-field appearance="outline">
      <mat-label>Delivery Address</mat-label>
      <textarea matInput formControlName="deliveryAddress" rows="3"></textarea>
    </mat-form-field>
  </form>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button mat-dialog-close>Cancel</button>
  <button mat-raised-button color="primary" (click)="onSubmit()" [disabled]="form.invalid">Create</button>
</mat-dialog-actions>
