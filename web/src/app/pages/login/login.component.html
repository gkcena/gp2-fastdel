<div class="login-wrapper">
  <mat-card class="login-card">
    <div class="login-header">
      <mat-icon class="logo-icon">local_shipping</mat-icon>
      <h1 class="logo-text">FastDel</h1>
      <p class="subtitle">Sign in to your account</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="login-form">
      <mat-form-field appearance="outline">
        <mat-label>Email</mat-label>
        <input matInput formControlName="email" type="email" placeholder="you&#64;fastdel.com">
        <mat-icon matPrefix>email</mat-icon>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Password</mat-label>
        <input matInput formControlName="password" [type]="hidePassword ? 'password' : 'text'">
        <mat-icon matPrefix>lock</mat-icon>
        <button mat-icon-button matSuffix type="button" (click)="hidePassword = !hidePassword" tabindex="-1">
          <mat-icon>{{ hidePassword ? 'visibility_off' : 'visibility' }}</mat-icon>
        </button>
      </mat-form-field>

      <button mat-raised-button color="primary" type="submit" class="submit-btn" [disabled]="loading || form.invalid">
        @if (loading) {
          <mat-spinner diameter="22"></mat-spinner>
        } @else {
          Sign In
        }
      </button>
    </form>
  </mat-card>
</div>
