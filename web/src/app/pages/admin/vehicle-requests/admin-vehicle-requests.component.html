<h1 class="page-title">Vehicle Requests</h1>

@if (loading) {
  <div class="spinner-wrap"><mat-spinner></mat-spinner></div>
} @else {
  <div class="table-wrap mat-elevation-z1">
    <table mat-table [dataSource]="requests">
      <ng-container matColumnDef="courierName">
        <th mat-header-cell *matHeaderCellDef>Courier</th>
        <td mat-cell *matCellDef="let row">{{ row.courierName }}</td>
      </ng-container>

      <ng-container matColumnDef="courierEmail">
        <th mat-header-cell *matHeaderCellDef>Email</th>
        <td mat-cell *matCellDef="let row">{{ row.courierEmail }}</td>
      </ng-container>

      <ng-container matColumnDef="requestedVehicleType">
        <th mat-header-cell *matHeaderCellDef>Vehicle Type</th>
        <td mat-cell *matCellDef="let row">{{ row.requestedVehicleType }}</td>
      </ng-container>

      <ng-container matColumnDef="requestedLicensePlate">
        <th mat-header-cell *matHeaderCellDef>License Plate</th>
        <td mat-cell *matCellDef="let row">
          <code class="plate-chip">{{ row.requestedLicensePlate }}</code>
        </td>
      </ng-container>

      <ng-container matColumnDef="status">
        <th mat-header-cell *matHeaderCellDef>Status</th>
        <td mat-cell *matCellDef="let row">
          <span [class]="getStatusClass(row.status)">{{ row.status }}</span>
        </td>
      </ng-container>

      <ng-container matColumnDef="createdAt">
        <th mat-header-cell *matHeaderCellDef>Date</th>
        <td mat-cell *matCellDef="let row">{{ row.createdAt | date:'mediumDate' }}</td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef></th>
        <td mat-cell *matCellDef="let row">
          @if (row.status === 'PENDING') {
            <button mat-stroked-button color="primary" (click)="approve(row.id)" class="action-btn">
              <mat-icon>check_circle</mat-icon> Approve
            </button>
            <button mat-stroked-button color="warn" (click)="reject(row.id)" class="action-btn">
              <mat-icon>cancel</mat-icon> Reject
            </button>
          }
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="columns"></tr>
      <tr mat-row *matRowDef="let row; columns: columns;"></tr>
    </table>
  </div>
}
