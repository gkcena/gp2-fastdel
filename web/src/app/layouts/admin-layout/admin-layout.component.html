<mat-sidenav-container class="layout-container">
  <mat-sidenav mode="side" opened class="sidenav">
    <div class="sidenav-header">
      <div class="brand">
        <mat-icon class="brand-icon">local_shipping</mat-icon>
        <span class="brand-name">FastDel</span>
      </div>
      <div class="user-block">
        @if (photoUrl) {
          <img [src]="photoUrl" alt="Profile" class="user-avatar-img">
        } @else {
          <div class="user-avatar">{{ userInitial }}</div>
        }
        <div class="user-info">
          <span class="user-name">{{ auth.getUserName() }}</span>
          <span class="role-badge">ADMIN</span>
        </div>
      </div>
    </div>
    <mat-nav-list class="nav-list">
      <a mat-list-item routerLink="/admin/dashboard" routerLinkActive="active-link">
        <mat-icon matListItemIcon>dashboard</mat-icon>
        <span matListItemTitle>Dashboard</span>
      </a>
      <a mat-list-item routerLink="/admin/users" routerLinkActive="active-link">
        <mat-icon matListItemIcon>people</mat-icon>
        <span matListItemTitle>Users</span>
      </a>
      <a mat-list-item routerLink="/admin/orders" routerLinkActive="active-link">
        <mat-icon matListItemIcon>inventory_2</mat-icon>
        <span matListItemTitle>Orders</span>
      </a>
      <a mat-list-item routerLink="/admin/vehicle-requests" routerLinkActive="active-link">
        <mat-icon matListItemIcon>directions_car</mat-icon>
        <span matListItemTitle>Vehicle Requests</span>
      </a>
      <a mat-list-item routerLink="/admin/profile" routerLinkActive="active-link">
        <mat-icon matListItemIcon>person</mat-icon>
        <span matListItemTitle>Profile</span>
      </a>
    </mat-nav-list>
    <div class="sidenav-footer">
      <button mat-stroked-button (click)="auth.logout()" class="logout-btn">
        <mat-icon>logout</mat-icon>
        Logout
      </button>
    </div>
  </mat-sidenav>
  <mat-sidenav-content class="content">
    <router-outlet />
  </mat-sidenav-content>
</mat-sidenav-container>
